name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Pull Testcontainers images
        run: |
          docker pull postgres:18
          docker pull confluentinc/cp-kafka:7.6.0
          docker pull redis:7-alpine
          docker pull docker.elastic.co/elasticsearch/elasticsearch:8.13.0

      - name: Build & test all backend services
        working-directory: backend
        run: ./gradlew build --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/**/build/reports/tests/
          retention-days: 7

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/unikly-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/unikly-app
        run: npm ci

      - name: Lint
        working-directory: frontend/unikly-app
        run: npm run lint

      - name: Unit tests (headless)
        working-directory: frontend/unikly-app
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Production build
        working-directory: frontend/unikly-app
        run: npm run build -- --configuration production

  # ── Docker build (on push to master only) ─────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all Docker images
        working-directory: infra
        run: docker compose build
