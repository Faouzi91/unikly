@if (loading()) {
  <div class="flex justify-center py-6">
    <span class="inline-block h-7 w-7 animate-spin rounded-full border-2 border-ink-300 border-t-brand"></span>
  </div>
} @else if (payment()) {
  <div class="space-y-3">
    <div class="flex flex-wrap items-center gap-2">
      <span class="pill" [ngClass]="statusDisplay().classes">{{ statusDisplay().label }}</span>
      <span class="text-sm font-semibold text-ink-700">{{ payment()!.amount | number: '1.2-2' }} {{ payment()!.currency }}</span>
    </div>

    @if (payment()!.status === 'FUNDED' && isClient()) {
      <div class="flex flex-wrap gap-2">
        <button type="button" class="btn-primary" (click)="onRelease()">Release Payment</button>
        <button type="button" class="btn-secondary text-red-700 hover:border-red-300 hover:bg-red-50" (click)="onRefund()">Request Refund</button>
      </div>
    }
  </div>
}
