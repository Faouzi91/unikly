<div class="flex flex-wrap gap-1">
  @for (skill of skills; track skill) {
    <mat-chip-row
      [removable]="editable"
      (removed)="editable && onRemove(skill)"
    >
      {{ skill }}
      @if (editable) {
        <button matChipRemove>
          <mat-icon>cancel</mat-icon>
        </button>
      }
    </mat-chip-row>
  }
  @if (skills.length === 0) {
    <span class="text-sm text-gray-400">No skills listed</span>
  }
</div>
