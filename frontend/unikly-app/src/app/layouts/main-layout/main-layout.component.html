<div class="page-shell min-h-screen lg:grid lg:grid-cols-[16rem_1fr]">
  <aside class="hidden border-r border-[var(--ui-border)] bg-[var(--ui-surface)] p-5 lg:flex lg:flex-col">
    <a routerLink="/" class="mb-8 inline-flex items-center gap-2">
      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-brand text-lg font-bold text-white">U</div>
      <span class="text-xl font-bold tracking-tight text-ink-900">Unikly</span>
    </a>

    <nav class="space-y-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="tab-button-active"
          class="tab-button flex w-full items-center justify-between"
          (click)="closeMenus()"
        >
          <span>{{ item.label }}</span>
          <svg class="h-4 w-4 text-ink-400" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </a>
      }

      @if (isAdmin()) {
        <a
          routerLink="/admin"
          routerLinkActive="tab-button-active"
          class="tab-button mt-4 flex w-full items-center justify-between border border-brand/20 bg-brand-soft/50"
          (click)="closeMenus()"
        >
          <span>Admin</span>
          <svg class="h-4 w-4 text-brand-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </a>
      }
    </nav>

    <button type="button" class="btn-secondary mt-auto w-full justify-center text-red-700 hover:border-red-300 hover:bg-red-50" (click)="logout()">
      Sign Out
    </button>
  </aside>

  <div class="flex min-h-screen flex-col">
    <header class="glass-nav">
      <div class="container-wide flex h-16 items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <button type="button" class="btn-ghost lg:hidden" (click)="mobileNavOpen.set(!mobileNavOpen())">
            Menu
          </button>
          <h1 class="text-sm font-semibold uppercase tracking-[0.12em] text-[var(--ui-muted)]">{{ getActivePage() }}</h1>
        </div>

        <div class="flex items-center gap-3">
          <app-notification-bell />

          <div class="relative">
            <button
              type="button"
              class="inline-flex items-center gap-2 rounded-xl border border-[var(--ui-border)] bg-[var(--ui-surface)] px-2.5 py-1.5"
              (click)="menuOpen.set(!menuOpen())"
            >
              <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-brand-soft text-xs font-semibold text-brand-dark">
                {{ getInitials() }}
              </span>
              <span class="hidden text-sm font-semibold text-ink-700 sm:inline">{{ getUsername() }}</span>
            </button>

            @if (menuOpen()) {
              <div class="card-panel absolute right-0 z-50 mt-2 w-48 p-1.5">
                <a routerLink="/profile" class="tab-button block w-full text-left" (click)="closeMenus()">My Profile</a>
                <button type="button" class="tab-button mt-1 w-full text-left text-red-700" (click)="logout()">Sign Out</button>
              </div>
            }
          </div>
        </div>
      </div>

      @if (mobileNavOpen()) {
        <div class="container-wide border-t border-[var(--ui-border)] py-2 lg:hidden">
          <nav class="grid gap-1">
            @for (item of navItems; track item.path) {
              <a [routerLink]="item.path" class="tab-button block" (click)="closeMenus()">{{ item.label }}</a>
            }
            @if (isAdmin()) {
              <a routerLink="/admin" class="tab-button block" (click)="closeMenus()">Admin</a>
            }
          </nav>
        </div>
      }
    </header>

    <main class="flex-1 py-5 sm:py-7">
      <div class="container-wide fade-up">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
