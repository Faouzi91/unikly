<div class="page-shell flex min-h-screen flex-col">
  <!-- Top Navbar -->
  <header class="glass-nav">
    <div class="container-wide flex h-16 items-center justify-between gap-4">

      <!-- Left: Logo + nav links (desktop) -->
      <div class="flex items-center gap-6">
        <a routerLink="/" class="inline-flex flex-shrink-0 items-center gap-2">
          <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-brand text-base font-bold text-white">U</div>
          <span class="hidden text-lg font-bold tracking-tight text-ink-900 sm:inline">Unikly</span>
        </a>

        <nav class="hidden items-center gap-1 md:flex">
          @for (item of navItems; track item.path) {
            <a
              [routerLink]="item.path"
              routerLinkActive="tab-button-active"
              class="tab-button"
              (click)="closeMenus()"
            >{{ item.label }}</a>
          }
        </nav>
      </div>

      <!-- Right: theme toggle + bell + avatar -->
      <div class="flex items-center gap-2">
        <!-- Theme icon toggle -->
        <button
          type="button"
          class="btn-ghost rounded-xl p-2"
          aria-label="Toggle theme"
          (click)="theme.toggleTheme()"
        >
          @if (theme.isDarkMode()) {
            <!-- Sun icon -->
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          } @else {
            <!-- Moon icon -->
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          }
        </button>

        <app-notification-bell />

        <!-- Avatar dropdown -->
        <div class="relative">
          <button
            type="button"
            class="inline-flex items-center gap-2 rounded-xl border border-[var(--ui-border)] bg-[var(--ui-surface)] px-2 py-1.5 transition hover:border-brand/30"
            (click)="menuOpen.set(!menuOpen())"
          >
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-brand-soft text-xs font-bold text-brand-dark">
              {{ getInitials() }}
            </span>
            <div class="hidden flex-col items-start sm:flex">
              <span class="text-sm font-semibold text-ink-900 leading-tight">{{ getUsername() }}</span>
              @if (getRole()) {
                <span class="text-[10px] font-semibold uppercase tracking-wide text-[var(--ui-muted)]">{{ getRole() }}</span>
              }
            </div>
            <svg class="hidden h-4 w-4 text-[var(--ui-muted)] sm:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          @if (menuOpen()) {
            <div
              class="card-panel absolute right-0 z-50 mt-2 w-52 overflow-hidden p-1.5"
              (click)="$event.stopPropagation()"
            >
              <div class="border-b border-[var(--ui-border)] px-3 pb-2.5 pt-2 mb-1">
                <p class="text-sm font-semibold text-ink-900">{{ getUsername() }}</p>
                @if (getRole()) {
                  <span class="pill bg-brand-soft/70 text-brand-dark text-[10px]">{{ getRole() }}</span>
                }
              </div>
              <a routerLink="/profile" class="tab-button flex w-full items-center gap-2 text-left" (click)="closeMenus()">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                My Profile
              </a>
              <div class="mt-1 border-t border-[var(--ui-border)] pt-1">
                <button type="button" class="tab-button w-full text-left text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20" (click)="logout()">
                  Sign Out
                </button>
              </div>
            </div>
          }
        </div>

        <!-- Hamburger (mobile) -->
        <button
          type="button"
          class="btn-ghost rounded-xl p-2 md:hidden"
          aria-label="Open navigation"
          (click)="mobileNavOpen.set(!mobileNavOpen())"
        >
          @if (mobileNavOpen()) {
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          } @else {
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          }
        </button>
      </div>
    </div>

    <!-- Mobile nav sheet -->
    @if (mobileNavOpen()) {
      <div class="container-wide border-t border-[var(--ui-border)] py-3 md:hidden">
        <nav class="grid gap-1">
          @for (item of navItems; track item.path) {
            <a [routerLink]="item.path" class="tab-button block" (click)="closeMenus()">{{ item.label }}</a>
          }
        </nav>
      </div>
    }
  </header>

  <!-- Page content -->
  <main class="flex-1 py-6 sm:py-8">
    <div class="container-wide fade-up">
      <router-outlet />
    </div>
  </main>
</div>

<!-- Close dropdowns when clicking outside -->
@if (menuOpen()) {
  <div class="fixed inset-0 z-30" (click)="menuOpen.set(false)"></div>
}
