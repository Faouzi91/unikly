services:

  prometheus:
    image: prom/prometheus:latest
    container_name: unikly-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - unikly-net

  grafana:
    image: grafana/grafana:latest
    container_name: unikly-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - unikly-net

networks:
  unikly-net:
    external: true
    name: infra_unikly-net
