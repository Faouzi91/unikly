worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on;

    gzip on;
    gzip_types text/html application/javascript text/css application/json
               application/xml text/plain text/xml text/javascript;
    gzip_min_length 256;

    # Security headers
    add_header X-Content-Type-Options   nosniff;
    add_header X-Frame-Options          DENY;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          strict-origin-when-cross-origin;

    server {
        listen 80;

        # Angular SPA
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Cache immutable static assets for 1 year
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # API proxy → Spring Cloud Gateway
        location /api/ {
            proxy_pass http://gateway:8080/api/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket proxy (STOMP / SockJS)
        location /ws/ {
            proxy_pass http://gateway:8080/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout          86400;
        }

        # Stripe webhooks → gateway → payment-service
        location /webhooks/ {
            proxy_pass http://gateway:8080/webhooks/;
            proxy_set_header Host        $host;
            proxy_set_header X-Real-IP   $remote_addr;
        }
    }
}
