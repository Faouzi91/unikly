global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: "job-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["job-service:8081"]

  - job_name: "user-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8082"]

  - job_name: "payment-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["payment-service:8083"]

  - job_name: "matching-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["matching-service:8084"]

  - job_name: "messaging-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["messaging-service:8085"]

  - job_name: "notification-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8086"]

  - job_name: "search-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["search-service:8087"]
