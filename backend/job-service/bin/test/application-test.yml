spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/realms/test   # overridden — JwtDecoder is mocked in tests
  flyway:
    locations: classpath:db/migration
    mixed: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  tracing:
    enabled: false
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
