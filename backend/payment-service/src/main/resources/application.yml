server:
  port: 8083

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/unikly_payments
    username: ${DB_USER:unikly}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: RECORD
      concurrency: 3
      observation-enabled: true
    template:
      observation-enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://keycloak:8080}/realms/unikly/protocol/openid-connect/certs

springdoc:
  api-docs:
    path: /api/payments/api-docs
  swagger-ui:
    path: /swagger-ui.html

stripe:
  # TEST key: set STRIPE_SECRET_KEY=sk_test_... in .env (https://dashboard.stripe.com/test/apikeys)
  # PROD key: set STRIPE_SECRET_KEY=sk_live_... in .env (disable Test Mode in Stripe dashboard)
  secret-key: ${STRIPE_SECRET_KEY:sk_test_51TDbpkCVmfTR414i40PDisCVPuDWBVQylWVt78JTcvjEF0ZEaqoVoeCRzhUgnGbAZe18JR49jHbjFdlc1dioDmSF0059bDqoxv}
  # Dev webhook: run `stripe listen --forward-to localhost:8080/webhooks/stripe`, copy the printed whsec_... into .env as STRIPE_WEBHOOK_SECRET, then restart the payment-service container.
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_59aa9a7ec85fa9a96b6730d1f9704f5e0fe683616f013135de4a1f19db12adad}

resilience4j:
  circuitbreaker:
    instances:
      stripe:
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      stripe:
        maxAttempts: 3
        waitDuration: 1000
        exponentialBackoffMultiplier: 2
  timelimiter:
    instances:
      stripe:
        timeoutDuration: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces
