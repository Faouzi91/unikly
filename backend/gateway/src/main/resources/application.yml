server:
  port: 8080

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://keycloak:8080}/realms/unikly/protocol/openid-connect/certs
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: job-service
              uri: http://job-service:8081
              predicates:
                - Path=/api/v1/jobs,/api/v1/jobs/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: job-service
                    fallbackUri: forward:/fallback/job-service

            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/api/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: user-service
                    fallbackUri: forward:/fallback/user-service

            - id: payment-service
              uri: http://payment-service:8083
              predicates:
                - Path=/api/v1/payments,/api/v1/payments/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: payment-service
                    fallbackUri: forward:/fallback/payment-service

            - id: matching-service
              uri: http://matching-service:8084
              predicates:
                - Path=/api/v1/matches/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: matching-service
                    fallbackUri: forward:/fallback/matching-service

            - id: messaging-service
              uri: http://messaging-service:8085
              predicates:
                - Path=/api/v1/messages/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: messaging-service
                    fallbackUri: forward:/fallback/messaging-service

            - id: notification-service
              uri: http://notification-service:8086
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: notification-service
                    fallbackUri: forward:/fallback/notification-service

            - id: search-service
              uri: http://search-service:8087
              predicates:
                - Path=/api/v1/search/**

            - id: webhooks
              uri: http://payment-service:8083
              predicates:
                - Path=/webhooks/**

            - id: ws-messages
              uri: ws://messaging-service:8085
              predicates:
                - Path=/ws/messages,/ws/messages/**

            - id: ws-notifications
              uri: ws://notification-service:8086
              predicates:
                - Path=/ws/notifications,/ws/notifications/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Job Service
        url: /api/v1/jobs/api-docs
      - name: User Service
        url: /api/users/api-docs
      - name: Payment Service
        url: /api/v1/payments/api-docs
      - name: Matching Service
        url: /api/v1/matches/api-docs
      - name: Messaging Service
        url: /api/v1/messages/api-docs
      - name: Notification Service
        url: /api/v1/notifications/api-docs
      - name: Search Service
        url: /api/v1/search/api-docs

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      job-service:
        base-config: default
      user-service:
        base-config: default
      payment-service:
        base-config: default
      matching-service:
        base-config: default
      messaging-service:
        base-config: default
      notification-service:
        base-config: default
      search-service:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces
